<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>프론트엔드 스터디 게시판</title>
  <link rel="stylesheet" href="posts.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <p class="badge">Frontend Study Board</p>
      <h1>프론트엔드 스터디 게시판</h1>
      <p class="subtitle">가상의 게시글과 댓글, 조회수, 추천 수를 확인할 수 있는 연습용 게시판입니다.</p>
    </div>
  </header>

  <main class="page">
    <section class="board-panel">
      <div class="section-title">
        <h2>게시글 목록</h2>
        <span>클릭하면 아래 상세 글로 이동합니다</span>
      </div>

      <div id="post-list" class="post-list"></div>
    </section>

    <section class="detail-panel">
      <div class="section-title">
        <h2>선택된 글</h2>
        <span>상단 목록에서 글을 눌러보세요</span>
      </div>

      <article id="post-detail" class="post-detail">
        <p class="detail-placeholder">게시글을 선택하면 여기에 상세 내용이 표시됩니다.</p>
      </article>

      <section class="comment-panel">
        <div class="section-title small">
          <h3>댓글</h3>
          <span id="comment-count">0개</span>
        </div>
        <div id="comment-list" class="comment-list"></div>
      </section>
    </section>
  </main>

  <script src="posts-data.js"></script>
  <script src="posts.js"></script>
</body>
</html>
